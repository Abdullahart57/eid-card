*{margin:0;padding:0;box-sizing:border-box}
:root{
  --brand-green:#00AB84;
  --bg:#f0eeeb;
  --bg-card:#e8e5e1;
  --text-dark:#1a1a1a;
}
body{
  font-family:'TheSansArabic',sans-serif;
  font-weight:200;
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:20px;
  color:var(--text-dark);
}
.container{
  max-width:420px;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}
h1{font-size:1.3rem;font-weight:200;color:var(--brand-green);text-align:center}
.subtitle{font-size:0.85rem;color:rgba(0,0,0,0.4);text-align:center;margin-top:-10px}

.card-wrapper{
  position:relative;
  width:100%;
  max-width:380px;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.1), 0 2px 12px rgba(0,0,0,0.06);
}
.card-wrapper img{width:100%;display:block}
.name-overlay{
  position:absolute;
  bottom:5.1%;
  left:50%;
  transform:translateX(-50%);
  text-align:center;
  direction:rtl;
  pointer-events:none;
  transition:opacity 0.3s;
  white-space:nowrap;
}
.name-overlay .label{
  font-weight:200;
  color:var(--brand-green);
  margin-bottom:1px;
}
.name-overlay .name{
  font-weight:200;
  color:var(--brand-green);
  line-height:1.4;
}

.controls{
  width:100%;
  max-width:380px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.prefix-row{
  display:flex;
  gap:8px;
  direction:rtl;
}
.prefix-option{
  flex:1;
  padding:11px 8px;
  border:2px solid rgba(0,171,132,0.25);
  border-radius:10px;
  background:#fff;
  color:rgba(0,0,0,0.35);
  font-family:'TheSansArabic',sans-serif;
  font-size:0.9rem;
  font-weight:200;
  text-align:center;
  cursor:pointer;
  transition:all 0.3s;
}
.prefix-option:hover{border-color:rgba(0,171,132,0.5)}
.prefix-option.active{
  border-color:var(--brand-green);
  color:var(--brand-green);
  background:rgba(0,171,132,0.08);
  font-weight:200;
}
.input-group input{
  width:100%;
  padding:14px 16px;
  border:2px solid rgba(0,171,132,0.3);
  border-radius:10px;
  background:#fff;
  color:var(--text-dark);
  font-family:'TheSansArabic',sans-serif;
  font-size:1.05rem;
  font-weight:200;
  text-align:center;
  outline:none;
  transition:border-color 0.3s, box-shadow 0.3s;
}
.input-group input::placeholder{color:rgba(0,0,0,0.25);font-weight:200}
.input-group input:focus{border-color:var(--brand-green);box-shadow:0 0 16px rgba(0,171,132,0.15)}
.btn-dl{
  width:100%;
  max-width:380px;
  padding:14px;
  border:none;
  border-radius:10px;
  font-family:'TheSansArabic',sans-serif;
  font-size:1rem;
  font-weight:200;
  cursor:pointer;
  background:var(--brand-green);
  color:#fff;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all 0.3s;
}
.btn-dl:hover{background:#00c99a;transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,171,132,0.3)}
.btn-dl:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-dl svg{width:18px;height:18px}
.footer{font-size:0.7rem;color:rgba(0,0,0,0.2);text-align:center;margin-top:4px}
canvas{display:none}

.toast{
  position:fixed;bottom:30px;left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--brand-green);color:#fff;
  padding:12px 24px;border-radius:50px;
  font-family:'TheSansArabic',sans-serif;font-weight:200;font-size:0.9rem;
  opacity:0;transition:all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
  z-index:999;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.container>*{animation:fadeIn 0.4s ease both}
.container>*:nth-child(2){animation-delay:0.05s}
.container>*:nth-child(3){animation-delay:0.1s}
.container>*:nth-child(4){animation-delay:0.15s}
.container>*:nth-child(5){animation-delay:0.2s}
</style>

    <div class="name-overlay" id="overlay">
      <div class="label" id="prefixDisplay"></div>
      <div class="name" id="nameDisplay"></div>
    </div>
  </div>

  <div class="controls">
    <div class="prefix-row">
      <div class="prefix-option active" data-prefix="أخوكم">أخوكم</div>
      <div class="prefix-option" data-prefix="أختكم">أختكم</div>
      <div class="prefix-option" data-prefix="">بدون</div>
    </div>
    <div class="input-group">
      <input type="text" id="nameInput" placeholder="أدخل اسمك هنا..." maxlength="40" autocomplete="off">
    </div>
  </div>

  <button class="btn-dl" id="downloadBtn" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    تحميل البطاقة
  </button>

  <p class="footer">الصادرات السعودية | عيد أضحى مبارك</p>
</div>

<canvas id="canvas"></canvas>
<div class="toast" id="toast"></div>

<script>
// Locked position: center bottom, matching reference
const posXpct = 50;   // center
const posYpct = 90.9; // bottom white area
const fontSizePt = 40;

const nameInput = document.getElementById('nameInput');
const nameDisplay = document.getElementById('nameDisplay');
const prefixDisplay = document.getElementById('prefixDisplay');
const overlay = document.getElementById('overlay');
const downloadBtn = document.getElementById('downloadBtn');
const cardImg = document.getElementById('cardImg');
const canvas = document.getElementById('canvas');
const toast = document.getElementById('toast');
const cardWrap = document.getElementById('cardWrap');

let currentPrefix = 'أخوكم';
overlay.style.opacity = '0';

function setPreviewSizes(){
  const cardW = cardWrap.offsetWidth;
  const scale = cardW / 1080;
  const namePx = fontSizePt * 1.33 * scale;
  nameDisplay.style.fontSize = namePx + 'px';
  prefixDisplay.style.fontSize = (namePx * 0.55) + 'px';
}
setPreviewSizes();
window.addEventListener('resize', setPreviewSizes);

document.querySelectorAll('.prefix-option').forEach(opt => {
  opt.addEventListener('click', function(){
    document.querySelectorAll('.prefix-option').forEach(o => o.classList.remove('active'));
    this.classList.add('active');
    currentPrefix = this.dataset.prefix;
    updatePreview();
  });
});

nameInput.addEventListener('input', updatePreview);

function updatePreview(){
  const name = nameInput.value.trim();
  if(name){
    prefixDisplay.textContent = currentPrefix;
    nameDisplay.textContent = name;
    overlay.style.opacity = '1';
    downloadBtn.disabled = false;
  } else {
    overlay.style.opacity = '0';
    downloadBtn.disabled = true;
  }
}

downloadBtn.addEventListener('click', function(){
  const name = nameInput.value.trim();
  if(!name) return;
  
  document.fonts.ready.then(() => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = function(){
      const W = img.naturalWidth;
      const H = img.naturalHeight;
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      
      ctx.drawImage(img, 0, 0, W, H);
      
      const centerX = W * (posXpct / 100);
      ctx.textAlign = 'center';
      ctx.fillStyle = '#00AB84';
      ctx.direction = 'rtl';
      
      const namePx = Math.round(fontSizePt * 1.33 * (W / 1080));
      const prefixPx = Math.round(namePx * 0.55);
      
      if(currentPrefix){
        const prefixY = H * (posYpct / 100) - namePx * 0.6;
        const nameY = H * (posYpct / 100) + namePx * 0.5;
        
        ctx.font = '200 ' + prefixPx + 'px "TheSansArabic", sans-serif';
        ctx.fillText(currentPrefix, centerX, prefixY);
        
        ctx.font = '200 ' + namePx + 'px "TheSansArabic", sans-serif';
        ctx.fillText(name, centerX, nameY);
      } else {
        const nameY = H * (posYpct / 100);
        ctx.font = '200 ' + namePx + 'px "TheSansArabic", sans-serif';
        ctx.fillText(name, centerX, nameY);
      }
      
      canvas.toBlob(function(blob){
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'تهنئة_عيد_الأضحى_' + name.replace(/\s+/g,'_') + '.png';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        toast.textContent = 'تم تحميل البطاقة بنجاح ✓';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
      }, 'image/png', 1.0);
    };
    img.src = cardImg.src;
  });
});
</script>
